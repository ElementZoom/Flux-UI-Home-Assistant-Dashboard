type: custom:paper-buttons-row
styles: !include ../../../styling/paper-buttons-row-styles.yaml
extra_styles: !include ../../../styling/paper-buttons-row-extra-styles.yaml
buttons:
  - entity: binary_sensor.presence_active_gbr
    state_icons:
      "on": m3of:sensor-occupied
      "off": m3o:sensors-krx-off
    layout: icon_name
    name: Presence Sensor
    tap_action:
      action: call-service
      service: script.toggle_presence_sensor_gbr
    styles: !include ../../..//styling/toggle-button-styles.yaml
    state_styles: !include ../../..//styling/toggle-button-state-styles.yaml
