type: vertical-stack
cards:
  - type: custom:streamline-card
    template: count_all_entity_card
    variables:
      entity: sensor.lights_gbr_count
      title: Lights
      icon: m3of:lightbulb
      color: "#FFBF00"
  - type: horizontal-stack
    cards:
      - type: custom:streamline-card
        template: light_card
        variables:
          entity: light.lights_gbrv
          name: null
          icon: null
      - type: custom:streamline-card
        template: button_card
        variables:
          entity: switch.guest_bathroom_mirror_light
          icon: mdi:lightbulb-fluorescent-tube
          background_color: rgba(238, 220, 130, 0.5)
  - type: custom:streamline-card
    template: light_card
    variables:
      entity: light.vanity_led_gbrv
      name: Vanity LED
      icon: hue:lightstrip
  - type: horizontal-stack
    cards:
      - type: custom:streamline-card
        template: light_card
        variables:
          entity: light.light_gbrt
          icon: null
          name: Toilet Light
      - type: custom:streamline-card
        template: light_card
        variables:
          entity: light.lights_gbrb
          icon: null
          name: Bathing Lights
  - type: custom:expander-card
    title: Expander Card
    cards:
      - type: vertical-stack
        cards:
          - type: custom:streamline-card
            template: spacer_card
            variables:
              padding: 4px
      - type: horizontal-stack
        cards:
          - type: custom:streamline-card
            template: button_card
            variables:
              entity: fan.guest_bathroom_vanity_fan
              icon: mdi:fan
              background_color: rgba(137, 207, 240, 0.5)
          - type: custom:streamline-card
            template: button_card
            variables:
              entity: fan.guest_bathroom_fan
              icon: mdi:fan
              background_color: rgba(137, 207, 240, 0.5)
    title-card:
      type: custom:streamline-card
      template: title_card
      variables:
        title: Fans
        title_font_size: 20px
    title-card-clickable: true
    title-card-button-overlay: false
    padding: "1"
    animation: true
    expanded: true
  - type: custom:expander-card
    title: Expander Card
    cards:
      - type: vertical-stack
        cards:
          - type: custom:streamline-card
            template: spacer_card
            variables:
              padding: 4px
          - type: horizontal-stack
            cards:
              - type: custom:streamline-card
                template: button_card
                variables:
                  entity: switch.network_switch_gbrv
                  icon: mdi:access-point-network
                  background_color: rgba(207, 159, 255, 0.5)
              - type: custom:streamline-card
                template: button_card
                variables:
                  entity: switch.other_switch_gbrv
                  icon: m3of:plug-connect
                  background_color: rgba(207, 159, 255, 0.5)
          - type: custom:streamline-card
            template: button_card
            variables:
              entity: switch.towel_switch_gbrb
              icon: mdi:heating-coil
              background_color: rgba(210, 43, 43, 0.5)
    title-card:
      type: custom:streamline-card
      template: title_card
      variables:
        title: Switches
        title_font_size: 20px
    title-card-clickable: true
    title-card-button-overlay: false
    padding: "1"
    animation: true
    expanded: false
