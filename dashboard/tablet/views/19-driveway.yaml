- type: sections
  max_columns: 4
  title: Driveway
  path: driveway
  icon: mdi:car
  subview: true
  sections:
    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-slide-in-right.yaml
          card: !include ../../shared/cards/individual-rooms/driveway/driveway-lights-card.yaml
    - type: grid
      cards:
        - type: custom:mod-card
          uix: include ../../shared/animations/mod-card-fade-in-down.yaml
          card: !include ../../shared/cards/individual-rooms/driveway/driveway-camera-card.yaml
    - type: grid
      cards:
        - type: custom:mod-card
          uix: include ../../shared/animations/mod-card-slide-in-left.yaml
          card:
            type: vertical-stack
            cards:
              - !include ../../shared/cards/individual-rooms/driveway/driveway-open-entities-card.yaml
              - type: conditional
                conditions:
                  - condition: state
                    entity: group.doors_drw
                    state: "off"
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:streamline-card
                      template: title_card
                      variables:
                        title: Room Illustration
                        title_font_size: 20px
                    - type: picture
                      image:
                        media_content_id: /local/room_pictures/Driveway.webp
  background: !include ../shared/background.yaml
  header:
    layout: start
    badges_position: top
    badges_wrap: wrap
    card:
      type: vertical-stack
      cards:
        - type: custom:streamline-card
          template: back_button_card
          variables:
            navigation_path: /tablet-dashboard/overview
        - type: custom:streamline-card
          template: title_card
          variables:
            title_font_size: 25px
            animation_delay: 0s
            title: Driveway
        - type: custom:streamline-card
          template: spacer_card
          variables:
            padding: 4px
        - !include ../../shared/cards/individual-rooms/driveway/driveway-details-card.yaml
        - !include ../../shared/cards/individual-rooms/driveway/driveway-paper-row-card.yaml
  badges: []
