- type: sections
  max_columns: 4
  title: Laundry
  path: laundry
  icon: m3of:laundry
  subview: true
  sections:
    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-slide-in-right.yaml
          card: !include ../../shared/cards/individual-rooms/laundry/laundry-entities-card.yaml
    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-fade-in-down.yaml
          card: !include ../../shared/cards/individual-rooms/laundry/laundry-camera-card.yaml
    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-slide-in-left.yaml
          card:
            type: vertical-stack
            cards:
              - !include ../../shared/cards/individual-rooms/laundry/laundry-open-entities-card.yaml
              - type: conditional
                conditions:
                  - condition: state
                    entity: binary_sensor.outdoor_door_sensor_lr_contact
                    state: "off"
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:streamline-card
                      template: title_card
                      variables:
                        title: Room Illustration
                        title_font_size: 20px
                    - type: picture
                      image:
                        media_content_id: /local/room_pictures/Laundry Room.webp
  background: !include ../shared/background.yaml
  badges: []
  header:
    card:
      type: vertical-stack
      cards:
        - type: custom:streamline-card
          template: back_button_card
          variables:
            navigation_path: /tablet-dashboard/overview
        - type: custom:streamline-card
          template: title_card
          variables:
            title_font_size: 25px
            animation_delay: 0s
            title: Laundry
        - type: custom:streamline-card
          template: spacer_card
          variables:
            padding: 4px
        - !include ../../shared/cards/individual-rooms/laundry/laundry-details-card.yaml
        - !include ../../shared/cards/individual-rooms/laundry/laundry-paper-row-card.yaml
    layout: start
    badges_position: top
    badges_wrap: wrap
