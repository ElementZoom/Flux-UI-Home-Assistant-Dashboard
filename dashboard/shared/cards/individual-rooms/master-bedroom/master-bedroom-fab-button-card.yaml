type: custom:custom-features-card
features:
  - type: custom:service-call
    entries:
      - type: dropdown
        options:
          - entity_id: input_boolean.lights_mbr
            tap_action:
              action: toggle
              target:
                entity_id: input_boolean.lights_mbr
              data: {}
            label: Main Lights
            icon: m3of:lightbulb
          - entity_id: input_boolean.other_lights_mbr
            tap_action:
              action: toggle
              target:
                entity_id: input_boolean.other_lights_mbr
              data: {}
            label: Other Lights
            icon: hue:recessed-ceiling
          - entity_id: input_boolean.master_bathroom
            tap_action:
              action: toggle
              target:
                entity_id: input_boolean.master_bathroom
              data: {}
            label: Bathroom
            icon: m3of:water-drop
        thumb: md3-fab-primary
        haptics: true
        icon: mdi:plus
    styles: |-
      .row {
        justify-content: flex-end;
      }
      custom-feature-button {
        flex: none;
        width: fit-content;
      }
transparent: true