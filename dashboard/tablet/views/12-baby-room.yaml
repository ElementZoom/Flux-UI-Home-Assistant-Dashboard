- type: sections
  max_columns: 4
  title: Baby Room
  path: baby-room
  icon: mdi:baby-carriage
  subview: true
  sections:
    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-slide-in-left.yaml
          card: !include ../../shared/cards/individual-rooms/baby-room/baby-room-entities-card.yaml
    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-fade-in-down.yaml
          card: !include ../../shared/cards/individual-rooms/baby-room/baby-room-climate-card.yaml
    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-slide-in-right.yaml
          card:
            type: vertical-stack
            cards:
              - !include ../../shared/cards/individual-rooms/baby-room/baby-room-open-entities-card.yaml
              - type: conditional
                conditions:
                  - condition: and
                    conditions:
                      - condition: state
                        entity: group.windows_br
                        state: "off"
                      - condition: state
                        entity: binary_sensor.door_sensor_br_contact
                        state: "off"
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:streamline-card
                      template: title_card
                      variables:
                        title: Room Illustration
                        title_font_size: 20px
                    - type: picture
                      image:
                        media_content_id: /local/room_pictures/Baby Room.webp
  background: !include ../shared/background.yaml
  header:
    card:
      type: vertical-stack
      cards:
        - type: custom:streamline-card
          template: back_button_card
          variables:
            navigation_path: /tablet-dashboard/overview
        - type: custom:streamline-card
          template: title_card
          variables:
            title: Baby Room
            title_font_size: 25px
            animation_delay: 0s
        - type: custom:streamline-card
          template: spacer_card
          variables:
            padding: 4px
        - !include ../../shared/cards/individual-rooms/baby-room/baby-room-details-card.yaml
        - !include ../../shared/cards/individual-rooms/baby-room/baby-room-paper-row-card.yaml
    layout: start
    badges_position: top
    badges_wrap: wrap
  badges: []
