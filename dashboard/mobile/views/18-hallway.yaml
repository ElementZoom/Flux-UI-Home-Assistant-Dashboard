- type: sections
  max_columns: 4
  title: Hallway
  path: hallway
  icon: mdi:image-frame
  subview: true
  sections:
    - type: grid
      cards:
        - type: vertical-stack
          cards:
            - type: horizontal-stack
              cards:
                - type: custom:streamline-card
                  template: back_button_card
                  variables:
                    navigation_path: /mobile-dashboard/rooms
                - type: custom:streamline-card
                  template: page_title_card
                  variables:
                    title: Hallway
                - type: custom:streamline-card
                  template: more-options-card
                  variables:
                    navigation_path: "#room-selector"
            - type: custom:streamline-card
              template: spacer_card
              variables:
                padding: 4px
            - !include ../../shared/cards/individual-rooms/hallway/hallway-details-card.yaml
            - !include ../../shared/cards/individual-rooms/hallway/hallway-paper-row-card.yaml
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-slide-in-right.yaml
          card:
            type: custom:simple-tabs
            pre-load: false
            active-background: var(--md-sys-color-primary)
            active-text-color: var(--md-sys-color-on-primary)
            text-color: var(--primary-text-color)
            tab_position: top
            alignment: center
            haptic_feedback: true
            hide_inactive_tab_titles: true
            tabs:
              - title: Room
                icon: m3of:home
                card: !include ../../shared/cards/individual-rooms/hallway/hallway-lights-card.yaml
              - title: Active
                icon: m3of:play-circle
                conditions:
                  - template: >-
                      {{ is_state('group.windows_hw', 'on') or
                      is_state('binary_sensor.door_sensor_hw_contact', 'on')}}
                card: !include ../../shared/cards/individual-rooms/hallway/hallway-open-entities-card.yaml
    - type: grid
      cards:
        - type: custom:streamline-card
          template: room_selector
          variables: {}
  background: !include ../shared/background.yaml
