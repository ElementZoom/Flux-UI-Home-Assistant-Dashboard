- type: sections
  max_columns: 4
  title: Guest Bathroom
  path: guest-bathroom
  icon: m3of:water-drop
  subview: true
  sections:
    - type: grid
      cards:
        - type: vertical-stack
          cards:
            - type: horizontal-stack
              cards:
                - type: custom:streamline-card
                  template: back_button_card
                  variables:
                    navigation_path: /mobile-dashboard/rooms
                - type: custom:streamline-card
                  template: page_title_card
                  variables:
                    title: Guest Bathroom
                - type: custom:streamline-card
                  template: more-options-card
                  variables:
                    navigation_path: "#room-selector"
            - type: custom:streamline-card
              template: spacer_card
              variables:
                padding: 4px
            - !include ../../shared/cards/individual-rooms/guest-bathroom/guest-bathroom-details-card.yaml
            - !include ../../shared/cards/individual-rooms/guest-bathroom/guest-bathroom-paper-row-card.yaml
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-slide-in-right.yaml
          card:
            type: custom:simple-tabs
            pre-load: false
            active-background: var(--md-sys-color-primary)
            active-text-color: var(--md-sys-color-on-primary)
            text-color: var(--primary-text-color)
            tab_position: top
            alignment: center
            haptic_feedback: true
            hide_inactive_tab_titles: true
            tabs:
              - title: Room
                icon: m3of:home
                card: !include ../../shared/cards/individual-rooms/guest-bathroom/guest-bathroom-entities-card.yaml
              - title: Active
                icon: m3of:play-circle
                conditions:
                  - template: "{{ is_state('group.windows_gbr', 'on')}}"
                card: !include ../../shared/cards/individual-rooms/guest-bathroom/guest-bathroom-open-entities-card.yaml
    - type: grid
      cards:
        - type: custom:streamline-card
          template: room_selector
          variables: {}
  background: !include ../shared/background.yaml
