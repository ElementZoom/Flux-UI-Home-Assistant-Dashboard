type: conditional
conditions:
  - condition: or
    conditions:
      - condition: state
        entity: group.windows_hw
        state: "on"
      - condition: state
        entity: binary_sensor.door_sensor_hw_contact
        state: "on"
card:
  type: vertical-stack
  cards:
    - type: custom:streamline-card
      template: open_doors_card
      variables:
        title: Doors
        door_1: binary_sensor.door_sensor_hw_contact
    - type: custom:streamline-card
      template: open_windows_card
      variables:
        title: Windows
        window_1: binary_sensor.left_window_sensor_hw_contact
        window_2: binary_sensor.right_window_sensor_hw_contact
