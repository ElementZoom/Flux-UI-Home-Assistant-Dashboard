type: vertical-stack
cards:
  - type: custom:streamline-card
    template: count_all_entity_card
    variables:
      entity: sensor.lights_etr_count
      title: Lights
      icon: m3of:lightbulb
      color: "#FFBF00"
  - type: horizontal-stack
    cards:
      - type: custom:streamline-card
        template: light_card
        variables:
          entity: light.lights_etr
          name: Room Lights
          icon: null
      - type: custom:streamline-card
        template: light_card
        variables:
          entity: light.entrance_table_led
          name: Table LED
          icon: hue:lightstrip
