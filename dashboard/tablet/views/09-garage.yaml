- type: sections
  max_columns: 4
  title: Garage
  path: garage
  icon: mdi:garage-variant
  subview: true
  sections:
    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-slide-in-left.yaml
          card: !include ../../shared/cards/individual-rooms/garage/garage-lights-card.yaml

    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-fade-in-down.yaml
          card: !include ../../shared/cards/individual-rooms/garage/garage-camera-card.yaml

    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-slide-in-right.yaml
          card: !include ../../shared/cards/individual-rooms/garage/garage-open-entities-card.yaml

  background: !include ../shared/background.yaml
  header:
    card:
      type: vertical-stack
      cards:
        - type: custom:streamline-card
          template: back_button_card
          variables:
            navigation_path: /tablet-dashboard/overview
        - type: custom:streamline-card
          template: title_card
          variables:
            title: Garage
            title_font_size: 25px
            animation_delay: 0s
        - !include ../../shared/cards/individual-rooms/garage/garage-details-card.yaml
        - !include ../../shared/cards/individual-rooms/garage/garage-paper-row-card.yaml
    layout: start
    badges_position: top
    badges_wrap: wrap
