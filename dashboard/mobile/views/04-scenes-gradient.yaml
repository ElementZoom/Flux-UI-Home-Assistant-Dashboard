- type: sections
  max_columns: 4
  title: Scenes
  path: scenes-gradient
  icon: m3o:layers
  sections:
    - type: grid
      cards:
        - type: horizontal-stack
          cards:
            - type: custom:streamline-card
              template: back_button_card
              variables:
                navigation_path: /mobile-dashboard/overview
            - type: custom:streamline-card
              template: page_title_card
              variables:
                title: Preset
            - type: custom:streamline-card
              template: more-options-card
              variables:
                navigation_path: "#light-type-selector"
        - type: custom:streamline-card
          template: scene_title_card
          variables:
            subtitle: Sunset
            animation_delay: 0.6s
        - type: custom:simple-swipe-card
          view_mode: carousel
          card_min_width: 400
          card_spacing: 8
          show_pagination: false
          auto_hide_pagination: 0
          auto_height: false

          cards:
            - type: horizontal-stack
              cards:
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/narcissa.webp
                    scene_value: narcissa
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/sunday_morning.webp
                    scene_value: sunday_morning
            - type: horizontal-stack
              cards:
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/crocus.webp
                    scene_value: crocus
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/horizon.webp
                    scene_value: horizon
        - type: custom:streamline-card
          template: scene_title_card
          variables:
            subtitle: Mountain
            animation_delay: 0.8s
        - type: custom:simple-swipe-card
          view_mode: carousel
          card_min_width: 400
          card_spacing: 8
          show_pagination: false
          auto_hide_pagination: 0
          auto_height: false

          cards:
            - type: horizontal-stack
              cards:
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/blossom.webp
                    scene_value: blossom
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/glitz_and_glam.webp
                    scene_value: glitz_and_glam
            - type: horizontal-stack
              cards:
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/crystalline.webp
                    scene_value: crystalline
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/nebula.webp
                    scene_value: nebula
            - type: horizontal-stack
              cards:
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/starlight.webp
                    scene_value: starlight
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/artic_aurora.webp
                    scene_value: artic_aurora
            - type: horizontal-stack
              cards:
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/mountain_breeze.webp
                    scene_value: mountain_breeze
                - type: custom:streamline-card
                  template: spacer_card
                  variables: {}
        - type: custom:streamline-card
          template: scene_title_card
          variables:
            subtitle: Lake
            animation_delay: 1.0s
        - type: custom:simple-swipe-card
          view_mode: carousel
          card_min_width: 400
          card_spacing: 8
          show_pagination: false
          auto_hide_pagination: 0
          auto_height: false

          cards:
            - type: horizontal-stack
              cards:
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/spring_blossom.webp
                    scene_value: spring_blossom
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/motown.webp
                    scene_value: motown
            - type: horizontal-stack
              cards:
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/spring_lake.webp
                    scene_value: spring_lake
                - type: custom:streamline-card
                  template: spacer_card
                  variables: {}
        - type: custom:streamline-card
          template: scene_title_card
          variables:
            subtitle: Coastal
            animation_delay: 1.2s
        - type: custom:simple-swipe-card
          view_mode: carousel
          card_min_width: 400
          card_spacing: 8
          show_pagination: false
          auto_hide_pagination: 0
          auto_height: false

          cards:
            - type: horizontal-stack
              cards:
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/soho.webp
                    scene_value: soho
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/blue_lagoon.webp
                    scene_value: blue_lagoon
            - type: horizontal-stack
              cards:
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/ocean_dawn.webp
                    scene_value: ocean_dawn
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/palm_beach.webp
                    scene_value: palm_beach
        - type: custom:streamline-card
          template: scene_title_card
          variables:
            subtitle: Hill
            animation_delay: 1.4s
        - type: custom:simple-swipe-card
          view_mode: carousel
          card_min_width: 400
          card_spacing: 8
          show_pagination: false
          auto_hide_pagination: 0
          auto_height: false

          cards:
            - type: horizontal-stack
              cards:
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/emerald_isle.webp
                    scene_value: emerald_isle
                - type: custom:streamline-card
                  template: scene_button_card
                  variables:
                    img_path: /local/hue/multi_color/winter_beauty.webp
                    scene_value: winter_beauty
    - type: grid
      cards:
        - type: custom:bubble-card
          card_type: pop-up
          hash: "#light-type-selector"
          name: Light Type Selector
          icon: hue:lightstrip
          popup_style: classic
          styles: |-
            #root {
                    max-height: 100% !important;
                    transition: transform var(--md-sys-motion-expressive-spatial-default) !important;
                  }
                  .bubble-header-container {
                    --bubble-button-background-color: var(--md-sys-color-on-secondary);
                    --bubble-button-icon-background-color: var(--md-sys-color-on-secondary);
                  }
                  .bubble-pop-up-container {
                    padding-bottom: 64px !important;
                  }
          bg_color: var(--md-sys-color-on-primary)
          bg_opacity: "85"
          button_type: name
          sub_button:
            main: []
            bottom: []
          slider_fill_orientation: left
          slider_value_position: right
          popup_mode: adaptive-dialog
          cards:
            - type: horizontal-stack
              cards:
                - type: custom:mushroom-template-card
                  icon: hue:recessed-ceiling
                  features_position: bottom
                  primary: Downlights
                  color: var(--md-sys-color-primary)
                  tap_action:
                    action: navigate
                    navigation_path: /mobile-dashboard/scenes
                  vertical: true
                  multiline_secondary: false
                  secondary: Navigate to Downlights Scene
    - type: grid
      cards:
        - type: custom:bubble-card
          card_type: pop-up
          hash: "#light-selector"
          name: Light Selector
          icon: mdi:led-strip-variant
          styles: |-
            #root {
                    max-height: 100% !important;
                    transition: transform var(--md-sys-motion-expressive-spatial-default) !important;
                  }
                  .bubble-header-container {
                    --bubble-button-background-color: var(--md-sys-color-on-secondary);
                    --bubble-button-icon-background-color: var(--md-sys-color-on-secondary);
          bg_color: var(--md-sys-color-on-primary)
          bg_opacity: "85"
          button_type: name
          popup_mode: adaptive-dialog
          popup_style: classic
          slider_fill_orientation: left
          slider_value_position: right
          cards:
            - !include ../../shared/cards/scenes/light-selector-card.yaml
  background: !include ../shared/background.yaml
  footer:
    card:
      type: custom:custom-features-card
      features:
        - type: custom:service-call
          entries:
            - type: dropdown
              options:
                - tap_action:
                    action: navigate
                    navigation_path: "#light-selector"
                  label: Light Selector
                  icon: mdi:led-strip-variant
                  entity_id: input_boolean.lights_mbr
              thumb: md3-fab-primary
              haptics: true
              icon: mdi:plus
              entity_id: ""
          styles: |-
            .row {
              justify-content: flex-end;
            }
            custom-feature-button {
              flex: none;
              width: fit-content;
            }
      transparent: true
