- type: sections
  max_columns: 4
  title: Guest Bathroom
  path: guest-bathroom
  icon: m3of:water-drop
  subview: true
  sections:
    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-slide-in-left.yaml
          card: !include ../../shared/cards/individual-rooms/guest-bathroom/guest-bathroom-entities-card.yaml
    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-fade-in-down.yaml
          card:
            type: vertical-stack
            cards:
              - type: custom:streamline-card
                template: title_card
                variables:
                  title: Room Illustration
                  title_font_size: 20px
              - type: picture
                image:
                  media_content_id: /local/room_pictures/Guest Bathroom.webp
    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-slide-in-right.yaml
          card: !include ../../shared/cards/individual-rooms/guest-bathroom/guest-bathroom-open-entities-card.yaml
  background: !include ../shared/background.yaml
  badges: []
  header:
    layout: start
    badges_position: top
    badges_wrap: wrap
    card:
      type: vertical-stack
      cards:
        - type: custom:streamline-card
          template: back_button_card
          variables:
            navigation_path: /tablet-dashboard/overview
        - type: custom:streamline-card
          template: title_card
          variables:
            title_font_size: 25px
            animation_delay: 0s
            title: Guest Bathroom
        - type: custom:streamline-card
          template: spacer_card
          variables:
            padding: 4px
        - !include ../../shared/cards/individual-rooms/guest-bathroom/guest-bathroom-details-card.yaml
        - !include ../../shared/cards/individual-rooms/guest-bathroom/guest-bathroom-paper-row-card.yaml
