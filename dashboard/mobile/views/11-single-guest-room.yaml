- type: sections
  max_columns: 4
  title: Single Guest Room
  path: single-guest-room
  icon: m3of:person-3
  subview: true
  sections:
    - type: grid
      cards:
        - type: vertical-stack
          cards:
            - type: horizontal-stack
              cards:
                - type: custom:streamline-card
                  template: back_button_card
                  variables:
                    navigation_path: /mobile-dashboard/rooms
                - type: custom:streamline-card
                  template: page_title_card
                  variables:
                    title: Single
                - type: custom:streamline-card
                  template: more-options-card
                  variables:
                    navigation_path: "#room-selector"
            - type: custom:streamline-card
              template: spacer_card
              variables:
                padding: 4px
            - !include ../../shared/cards/individual-rooms/single-guest-room/single-guest-room-details-card.yaml
            - !include ../../shared/cards/individual-rooms/single-guest-room/single-guest-room-paper-row-card.yaml
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-slide-in-right.yaml
          card:
            type: custom:simple-tabs
            pre-load: false
            active-background: var(--md-sys-color-primary)
            active-text-color: var(--md-sys-color-on-primary)
            text-color: var(--primary-text-color)
            tab_position: top
            alignment: center
            haptic_feedback: true
            hide_inactive_tab_titles: true
            tabs:
              - title: Room
                icon: m3of:home
                card: !include ../../shared/cards/individual-rooms/single-guest-room/single-guest-room-entities-card.yaml
              - title: Climate
                icon: m3of:heat-pump
                card: !include ../../shared/cards/individual-rooms/single-guest-room/single-guest-room-climate-card.yaml
              - title: Active
                icon: m3of:play-circle
                conditions:
                  - template: >-
                      {{ is_state('binary_sensor.windows_sgr', 'on') or
                      is_state('binary_sensor.door_sensor_sgr_contact', 'on')
                      }}
                card: !include ../../shared/cards/individual-rooms/single-guest-room/single-guest-room-open-entities-card.yaml

    - type: grid
      cards:
        - type: custom:streamline-card
          template: room_selector
          variables: {}
  background: !include ../shared/background.yaml
