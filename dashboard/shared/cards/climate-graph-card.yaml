type: custom:vertical-stack-in-card
cards:
  - type: grid
    square: false
    columns: 2
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.house_average_temperature
        primary: >
          {{ states(entity) | round(1) }} {{ state_attr('weather.home',
          'temperature_unit') }}
        secondary: |
          Indoor
        icon: |
          {% set hvac_mode = states('climate.heat_pump') %}
          {% if hvac_mode == 'heat' %} mdi:fire
          {% elif hvac_mode == 'cool' %} mdi:snowflake
          {% elif hvac_mode == 'fan_only' %} mdi:fan
          {% else %} m3of:thermometer
          {% endif %}
        icon_color: |
          {% set hvac_mode = states('climate.heat_pump') %}
          {% if hvac_mode == 'heat' %} #FF6F22
          {% elif hvac_mode == 'cool' %} #2196F3
          {% elif hvac_mode == 'fan_only' %} #029688
          {% else %}
            {% set temp = states('sensor.house_average_temperature') | float %}
            {% if temp < 13 %}
              #B4A5B7
            {% elif temp < 16 %}          
              #DBC9DE
            {% elif temp < 19 %}
              #ACDCF6
            {% elif temp < 22 %}
              #D2E5DE
            {% elif temp < 24 %}
              #FFE7A3
            {% elif temp < 27 %}
              #F7C48D
            {% else %}
              #E37575
            {% endif %}
          {% endif %}
        tap_action:
          action: more-info
        uix:
          style: |
            {% set hvac_mode = states('climate.heat_pump') %}
            ha-card {
              {% if hvac_mode == 'heat' %}
                animation: heat-flicker 1.5s ease-in-out infinite;
              {% elif hvac_mode == 'cool' %}
                animation: cool-shimmer 2s ease-in-out infinite;
              {% elif hvac_mode == 'fan_only' %}
                animation: fan-wobble 2s ease-in-out infinite;
              {% endif %}
            }

            @keyframes heat-flicker {
              0%, 100% { 
                transform: scale(1);
                filter: brightness(1);
              }
              25% { 
                transform: scale(1.02);
                filter: brightness(1.1);
              }
              50% { 
                transform: scale(1);
                filter: brightness(0.95);
              }
              75% { 
                transform: scale(1.02);
                filter: brightness(1.05);
              }
            }

            @keyframes cool-shimmer {
              0%, 100% { 
                transform: translateY(0px);
                opacity: 1;
              }
              50% { 
                transform: translateY(-2px);
                opacity: 0.9;
              }
            }

            @keyframes fan-wobble {
              0%, 100% { 
                transform: rotate(0deg) scale(1);
              }
              25% { 
                transform: rotate(1deg) scale(1.01);
              }
              50% { 
                transform: rotate(0deg) scale(1.02);
              }
              75% { 
                transform: rotate(-1deg) scale(1.01);
              }
            }

            mushroom-shape-icon {
              {% if hvac_mode == 'heat' %}
                animation: icon-heat-pulse 1s ease-in-out infinite !important;
              {% elif hvac_mode == 'cool' %}
                animation: icon-cool-float 3s ease-in-out infinite !important;
              {% elif hvac_mode == 'fan_only' %}
                animation: icon-fan-rotate 3s linear infinite !important;
              {% endif %}
            }

            @keyframes icon-heat-pulse {
              0%, 100% { transform: scale(1); }
              50% { transform: scale(1.15); }
            }

            @keyframes icon-cool-float {
              0%, 100% { transform: translateY(0px) rotate(0deg); }
              50% { transform: translateY(-3px) rotate(5deg); }
            }

            @keyframes icon-fan-rotate {
              0% { transform: rotate(0deg); }
              100% { transform: rotate(360deg); }
            }
      - type: custom:mushroom-template-card
        entity: sensor.outdoor_temperature
        primary: >
          {{ states(entity) | round(1) }} {{ state_attr('weather.home',
          'temperature_unit') }}
        secondary: |
          Outdoor
        icon: "{{ states('sensor.weather_condition_icon') }}"
        icon_color: |
          {% set temp = state_attr('weather.home', 'temperature') | float %}
          {% if temp < 13 %}
            #988C9B
          {% elif temp < 16 %}          
            #BAABBD
          {% elif temp < 19 %}
            #92BB D1
          {% elif temp < 22 %}
            #B2C4BD
          {% elif temp < 24 %}
            #D8C48A
          {% elif temp < 27 %}
            #D2A676
          {% else %}
            #C26161
          {% endif %}
        tap_action:
          action: more-info
  - type: custom:config-template-card
    entities:
      - climate.heat_pump
      - sensor.house_average_temperature
      - sensor.outdoor_temperature
    variables:
      - states['climate.heat_pump'].state
      - states['sensor.house_average_temperature'].state
      - states['sensor.outdoor_temperature'].state
    card:
      type: custom:mini-graph-card
      entities:
        - entity: sensor.house_average_temperature
          name: Indoor
          color: |-
            ${vars[0] === 'heat' ? '#FF6F22' : 
              (vars[0] === 'cool' ? '#2196F3' : 
              (vars[0] === 'fan_only' ? '#029688' : 
              (vars[1] < 13 ? '#B4A5B7' :
              (vars[1] < 16 ? '#DBC9DE' :
              (vars[1] < 19 ? '#ACDCF6' :
              (vars[1] < 22 ? '#D2E5DE' :
              (vars[1] < 24 ? '#FFE7A3' :
              (vars[1] < 27 ? '#F7C48D' : '#E37575'))))))))}
        - entity: sensor.outdoor_temperature
          name: Outdoor
          color: |-
            ${vars[2] < 13 ? '#988C9B' :
              (vars[2] < 16 ? '#BAABBD' :        
              (vars[2] < 19 ? '#92BBD1' :
              (vars[2] < 22 ? '#B2C4BD' :
              (vars[2] < 24 ? '#D8C48A' :
              (vars[2] < 27 ? '#D2A676' :'#C26161')))))}
          y_axis: secondary
      hours_to_show: 24
      line_width: 3
      font_size: 50
      animate: true
      show:
        name: false
        icon: false
        state: false
        legend: false
        fill: fade
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-climate-card
        entity: climate.heat_pump
        primary_info: none
        secondary_info: none
        icon_type: none
        show_temperature_control: true
      - type: custom:mushroom-climate-card
        entity: climate.heat_pump
        primary_info: none
        secondary_info: none
        icon_type: none
        hvac_modes:
          - cool
          - heat
          - fan_only
          - "off"
