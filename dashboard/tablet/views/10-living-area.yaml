- type: sections
  max_columns: 4
  title: Living Area
  path: living-area
  icon: mdi:sofa
  subview: true
  sections:
    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-slide-in-left.yaml
          card: !include ../../shared/cards/individual-rooms/living-area/living-area-selection-card.yaml
    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-fade-in-down.yaml
          card:
            type: vertical-stack
            cards:
              - !include ../../shared/cards/individual-rooms/living-area/living-area-climate-card.yaml
    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-slide-in-right.yaml
          card:
            type: vertical-stack
            cards:
              - !include ../../shared/cards/individual-rooms/living-area/living-area-open-entities-card.yaml
              - type: conditional
                conditions:
                  - condition: and
                    conditions:
                      - condition: state
                        entity: group.windows_la
                        state: "off"
                      - condition: state
                        entity: group.doors_la
                        state: "off"
                card:
                  type: vertical-stack
                  cards:
                    - type: custom:streamline-card
                      template: title_card
                      variables:
                        title: Room Illustration
                        title_font_size: 20px
                    - type: picture
                      image:
                        media_content_id: /local/room_pictures/Living Area.webp
  background: !include ../shared/background.yaml
  header:
    card:
      type: vertical-stack
      cards:
        - type: custom:streamline-card
          template: back_button_card
          variables:
            navigation_path: /tablet-dashboard/overview
        - type: custom:streamline-card
          template: title_card
          variables:
            title: Living Area
            title_font_size: 25px
            animation_delay: 0s
        - type: custom:streamline-card
          template: spacer_card
          variables:
            padding: 4px
        - !include ../../shared/cards/individual-rooms/living-area/living-area-details-card.yaml
        - !include ../../shared/cards/individual-rooms/living-area/living-area-paper-row-card.yaml
    layout: start
    badges_position: top
    badges_wrap: wrap
  badges: []
  footer:
    card: !include ../../shared/cards/individual-rooms/living-area/living-area-fab-button-card.yaml
    max_width: 1600
