type: conditional
conditions:
  - condition: numeric_state
    entity: sensor.current_wind_speed
    below: 30
card:
  type: custom:paper-buttons-row
  styles:
    justify-content: flex-start
    flex-wrap: wrap
    font-size: 0.9em
    line-height: 1.2em
    margin: 6px 0 2px 0
    width: 100%
  buttons:
    - layout: name|icon
      entity: weather.home
      name: >-
        {% set temp = states('sensor.temperature_sensor_otd_temperature') |
        float | round(1) %} {% set unit = state_attr('weather.home',
        'temperature_unit') %} {% set condition = states('weather.home') | title
        %} {% if is_state('binary_sensor.outdoor_rain_sensor_dry', 'off') %}
          {{ temp }} {{ unit }}, Raining
        {% else %}
          {{ temp }} {{ unit }}, {{ condition }}
        {% endif %}
      icon: |-
        {% if is_state('binary_sensor.outdoor_rain_sensor_dry', 'off') %}
          mdi:weather-pouring
        {% else %}
          {{ states('sensor.weather_condition_icon') }}
        {% endif %}
      tap_action:
        action: navigate
        navigation_path: "?tab=forecast#weather-panel"
      styles:
        icon:
          color: var(--md-sys-color-primary)
        name:
          color: var(--md-sys-color-primary)
          font-weight: bold
        button:
          padding: 2px 8px
          background-color: color-mix(in srgb, var(--md-sys-color-on-primary) 25%, transparent)
          border-radius: 24px
          flex-basis: 1
          flex-shrink: 0
          display: flex
          animation: slideInLeft 0.3s ease-out 0.5s both
          transition: all 0.3s ease
    - layout: name
      name: ·
      styles:
        button:
          flex-basis: 1
          flex-shrink: 0
          animation: fadeIn 0.8s ease-out 1.1s both
        name:
          color: var(--primary-text-color)
      tap_action:
        action: none
    - layout: name
      entity: weather.home
      name: >-
        {% set forecast = state_attr('sensor.daily_weather_data_google_weather',
        'forecast_data') %}  {% if forecast is defined and forecast.temperature
        is defined %}
          {{ forecast.temperature | round(0) | int }}°🔺 / {{ forecast.templow | round(0) | int }}° {{ state_attr('weather.home', 'temperature_unit') }}🔻
        {% else %}
          N/A {{ state_attr('weather.home', 'temperature_unit') }}
        {% endif %}
      tap_action:
        action: navigate
        navigation_path: "?tab=forecast#weather-panel"
      styles:
        name:
          color: var(--md-sys-color-primary)
          font-weight: bold
        button:
          padding: 2px 8px
          background-color: color-mix(in srgb, var(--md-sys-color-on-primary) 25%, transparent)
          border-radius: 24px
          flex-basis: 1
          flex-shrink: 0
          display: flex
          animation: slideInLeft 0.3s ease-out 0.9s both
          transition: all 0.3s ease
  uix:
    style: |
      ha-card {
        overflow: visible !important;
      }
      @keyframes fadeIn {
        from {
          opacity: 1;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideInLeft {
        from {
          opacity: 1;
          transform: translateX(-8px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
