- type: sections
  max_columns: 3
  icon: mdi:shield-lock
  path: alarmo
  title: Alarmo
  sections:
    - type: grid
      cards:
        - type: custom:mod-card
          uix: !include ../../shared/animations/mod-card-slide-in-right.yaml
          card:
            type: vertical-stack
            cards:
              - type: custom:streamline-card
                template: title_navigation_card
                variables:
                  title: Camera
                  navigation_path: /tablet-dashboard/camera
                  title_font_size: 20px
              - !include ../../shared/cards/individual-rooms/security/security-paper-row-card.yaml
              - !include ../../shared/cards/individual-rooms/security/security-entities-card.yaml
    - type: grid
      cards:
        - type: vertical-stack
          cards:
            - type: custom:stack-in-card
              mode: vertical
              cards:
                - type: custom:streamline-card
                  template: title_subtitle_card
                  variables:
                    title: Driveway
                    subtitle: "{{ states ('sensor.right_driveway_camera_status') }}"
                - !include ../../shared/cards/camera/driveway-card-with-chips.yaml
            - !include ../../shared/cards/camera/driveway-card.yaml
            - type: custom:streamline-card
              template: title_subtitle_card
              variables:
                title: Left Walkway
                subtitle: "{{ states ('sensor.left_walkway_camera_status') }}"
            - !include ../../shared/cards/camera/left-walkway-card.yaml
  badges:
    - type: custom:streamline-card
      template: back_button_card
      variables:
        navigation_path: /tablet-dashboard/overview
  header:
    layout: responsive
    badges_position: top
    badges_wrap: wrap
  cards: []
  background: !include ../shared/background.yaml
  subview: true
