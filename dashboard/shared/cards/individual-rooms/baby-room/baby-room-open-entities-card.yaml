type: conditional
conditions:
  - condition: or
    conditions:
      - condition: state
        entity: group.windows_br
        state: "on"
      - condition: state
        entity: binary_sensor.door_sensor_br_contact
        state: "on"
card:
  type: vertical-stack
  cards:
    - type: custom:streamline-card
      template: open_doors_card
      variables:
        - title: Door
        - door_1: binary_sensor.door_sensor_br_contact
    - type: custom:streamline-card
      template: open_windows_card
      variables:
        - title: Windows
        - window_1: binary_sensor.left_window_sensor_br_contact
        - window_2: binary_sensor.right_window_sensor_br_contact
